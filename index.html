    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock Peper Scissor</title>
    <link rel="stylesheet" href="style.css">


    </head>
    <body>
        <h1>Rock Paper Scissor Game</h1>
        <div class="choices">
        <div class="choice" id="rock">
            <img src="rock.png" alt="rock">            </div>
        <div class="choice" id="paper">
                    
            <img src="paper.png" alt="paper">
        </div>
        <div class="choice" id="scissor">
            <img src="scissor.png" alt="scissor">
        </div>
        </div>


<!-- ===== CGPT ADVANCED BATTLE ARENA ===== -->
<div class="cgpt-battle-area">

    <div class="cgpt-label cgpt-user-label">USER</div>
    <div class="cgpt-label cgpt-comp-label">COMPUTER</div>

    <img id="cgpt-user-img" class="cgpt-move cgpt-left" />
    <div id="cgpt-blast" class="cgpt-blast"></div>
    <img id="cgpt-comp-img" class="cgpt-move cgpt-right" />

    <div id="cgpt-result" class="cgpt-result"></div>

</div>
<!-- ===== CGPT ADVANCED BATTLE ARENA END ===== -->

    <div class="score-board">
    <div class="score">
    <p id="user-score">0</p>
    <p>You</p>

    </div>
    <div class="score">
    <p id ="computer-score">0</p>
    <p>Comp</p>
    </div>

    </div>

    <div class="msg-container">
        <p id="msg">
    Play Your Move
        </p>
    </div>
<script src="app.js"></script>
    </body>
    </html>
